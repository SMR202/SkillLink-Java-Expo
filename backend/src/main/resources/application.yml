spring:
  application:
    name: skilllink-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/skilllink;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  sql:
    init:
      mode: never

  h2:
    console:
      enabled: true
      path: /h2-console

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

server:
  port: 8080

# JWT Configuration
app:
  jwt:
    secret: ${APP_JWT_SECRET:SkillLinkSuperSecretKeyForJWTTokenGeneration2026MustBeAtLeast256BitsLong!!}
    access-token-expiry: 86400000    # 24 hours in ms
    refresh-token-expiry: 604800000  # 7 days in ms

# Swagger / OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.skilllink: INFO
    org.springframework.security: INFO
