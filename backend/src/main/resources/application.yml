spring:
  application:
    name: skilllink-backend

  # Using H2 in-memory DB for development (easy setup, no install needed)
  # Switch to PostgreSQL for production by uncommenting below
  datasource:
    url: jdbc:h2:file:./data/skilllink;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # PostgreSQL config (uncomment for production)
  # datasource:
  #   url: jdbc:postgresql://localhost:5432/skilllink
  #   driver-class-name: org.postgresql.Driver
  #   username: postgres
  #   password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
        # dialect: org.hibernate.dialect.PostgreSQLDialect

  sql:
    init:
      mode: always

  h2:
    console:
      enabled: true
      path: /h2-console

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

server:
  port: 8080

# JWT Configuration
app:
  jwt:
    secret: SkillLinkSuperSecretKeyForJWTTokenGeneration2026MustBeAtLeast256BitsLong!!
    access-token-expiry: 86400000    # 24 hours in ms
    refresh-token-expiry: 604800000  # 7 days in ms

# Swagger / OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.skilllink: DEBUG
    org.springframework.security: INFO
