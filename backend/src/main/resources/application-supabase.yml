spring:
  datasource:
    # Use the direct Supabase Postgres endpoint (port 5432) for Spring Boot/Hibernate.
    url: ${SUPABASE_DB_URL:jdbc:postgresql://localhost:5432/skilllink}
    driver-class-name: org.postgresql.Driver
    username: ${SUPABASE_DB_USER:postgres}
    password: ${SUPABASE_DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: ${SUPABASE_DB_POOL_SIZE:5}
      minimum-idle: ${SUPABASE_DB_MIN_IDLE:1}

  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    url: ${SUPABASE_DB_URL:jdbc:postgresql://localhost:5432/skilllink}
    user: ${SUPABASE_DB_USER:postgres}
    password: ${SUPABASE_DB_PASSWORD:postgres}

  h2:
    console:
      enabled: false
