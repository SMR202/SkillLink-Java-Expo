<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center font-body-md">
<main class="w-full max-w-md px-md py-lg flex flex-col">
<!-- Header -->
<div class="text-center mb-lg">
<h1 class="font-h2 text-h2 text-primary-container mb-xs">SkillLink</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Welcome back. Please enter your details.</p>
</div>
<!-- Form -->
<form class="flex flex-col gap-md">
<!-- Email Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-bold text-label-bold text-on-surface" for="email">Email</label>
<input class="bg-surface-container-lowest border border-outline-variant text-on-surface font-body-md text-body-md rounded-lg px-md py-sm focus:outline-none focus:ring-2 focus:ring-primary-container focus:border-transparent transition-all" id="email" name="email" placeholder="Enter your email" required="" type="email"/>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-bold text-label-bold text-on-surface" for="password">Password</label>
<input class="bg-surface-container-lowest border border-outline-variant text-on-surface font-body-md text-body-md rounded-lg px-md py-sm focus:outline-none focus:ring-2 focus:ring-primary-container focus:border-transparent transition-all" id="password" name="password" placeholder="Enter your password" required="" type="password"/>
<div class="flex justify-end mt-xs">
<a class="font-caption text-caption text-secondary hover:text-primary-container transition-colors" href="#">Forgot Password?</a>
</div>
</div>
<!-- CTA -->
<button class="w-full bg-primary-container text-on-primary font-label-bold text-label-bold py-sm rounded-lg hover:bg-primary transition-colors shadow-[0px_4px_20px_rgba(0,0,0,0.03)] hover:shadow-[0px_10px_30px_rgba(0,0,0,0.06)] mt-sm" type="submit">
                Log In
            </button>
</form>
<!-- Footer -->
<div class="mt-lg text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                Don't have an account? 
                <a class="font-label-bold text-label-bold text-primary-container hover:text-primary transition-colors" href="#">Sign Up</a>
</p>
</div>
