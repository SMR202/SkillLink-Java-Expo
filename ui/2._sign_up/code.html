<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign Up - SkillLink</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "error-container": "#ffdad6",
                        "on-primary-fixed": "#0f0069",
                        "on-secondary-fixed-variant": "#404758",
                        "tertiary-fixed": "#ffdbcc",
                        "surface": "#fcf8ff",
                        "tertiary": "#7e3000",
                        "inverse-primary": "#c3c0ff",
                        "outline": "#777587",
                        "primary-fixed": "#e2dfff",
                        "on-surface": "#1b1b24",
                        "secondary-container": "#d9dff5",
                        "on-primary": "#ffffff",
                        "primary": "#3525cd",
                        "secondary": "#575e70",
                        "surface-container-highest": "#e4e1ee",
                        "outline-variant": "#c7c4d8",
                        "secondary-fixed-dim": "#c0c6db",
                        "on-primary-container": "#dad7ff",
                        "tertiary-fixed-dim": "#ffb695",
                        "surface-variant": "#e4e1ee",
                        "primary-fixed-dim": "#c3c0ff",
                        "surface-container-low": "#f5f2ff",
                        "on-tertiary-fixed": "#351000",
                        "surface-bright": "#fcf8ff",
                        "on-tertiary": "#ffffff",
                        "surface-tint": "#4d44e3",
                        "background": "#fcf8ff",
                        "surface-dim": "#dcd8e5",
                        "inverse-on-surface": "#f3effc",
                        "on-error": "#ffffff",
                        "on-error-container": "#93000a",
                        "on-surface-variant": "#464555",
                        "primary-container": "#4f46e5",
                        "error": "#ba1a1a",
                        "on-secondary-fixed": "#141b2b",
                        "on-tertiary-fixed-variant": "#7b2f00",
                        "tertiary-container": "#a44100",
                        "on-secondary": "#ffffff",
                        "secondary-fixed": "#dce2f7",
                        "surface-container-high": "#eae6f4",
                        "on-secondary-container": "#5c6274",
                        "on-tertiary-container": "#ffd2be",
                        "surface-container-lowest": "#ffffff",
                        "surface-container": "#f0ecf9",
                        "inverse-surface": "#302f39",
                        "on-primary-fixed-variant": "#3323cc",
                        "on-background": "#1b1b24"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xl": "80px",
                        "xs": "4px",
                        "base": "8px",
                        "lg": "48px",
                        "grid_columns": "12",
                        "sm": "12px",
                        "gutter": "24px",
                        "md": "24px",
                        "margin": "auto"
                    },
                    "fontFamily": {
                        "body-md": ["Manrope"],
                        "body-lg": ["Manrope"],
                        "caption": ["Manrope"],
                        "h2": ["Manrope"],
                        "h1": ["Manrope"],
                        "h3": ["Manrope"],
                        "label-bold": ["Manrope"]
                    },
                    "fontSize": {
                        "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "caption": ["12px", { "lineHeight": "1.4", "fontWeight": "500" }],
                        "h2": ["36px", { "lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "h1": ["48px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "800" }],
                        "h3": ["24px", { "lineHeight": "1.4", "letterSpacing": "0", "fontWeight": "700" }],
                        "label-bold": ["14px", { "lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background min-h-screen flex items-center justify-center p-md font-body-md text-on-surface antialiased">
<!-- Main Container -->
<main class="w-full max-w-[480px]">
<!-- Brand / Header -->
<div class="text-center mb-lg">
<h1 class="text-h3 font-h3 text-primary-container mb-2 tracking-tight">SkillLink</h1>
<h2 class="text-h2 font-h2 text-on-surface mb-3">Create an account</h2>
<p class="text-body-md font-body-md text-on-surface-variant">Join the premium network of professionals.</p>
</div>
<!-- Sign Up Card -->
<div class="bg-surface-container-lowest rounded-xl p-md sm:p-lg shadow-[0_4px_20px_rgba(0,0,0,0.03)] border border-outline-variant/30 relative overflow-hidden">
<!-- Subtle gradient decoration -->
<div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-primary-container to-inverse-primary opacity-80"></div>
<!-- Role Toggle (Pill Switcher) -->
<div class="flex bg-surface-container p-xs rounded-full mb-lg relative">
<button class="flex-1 py-3 px-4 text-center rounded-full bg-surface-container-lowest shadow-sm text-label-bold font-label-bold text-primary-container transition-all relative z-10 flex items-center justify-center gap-2" type="button">
<span class="material-symbols-outlined text-[18px]">person</span>
                    Client
                </button>
<button class="flex-1 py-3 px-4 text-center rounded-full text-label-bold font-label-bold text-on-surface-variant hover:text-on-surface transition-colors relative z-10 flex items-center justify-center gap-2" type="button">
<span class="material-symbols-outlined text-[18px]">work</span>
                    Provider
                </button>
</div>
<!-- Form -->
<form action="#" class="flex flex-col gap-md" method="POST">
<!-- Full Name -->
<div class="flex flex-col gap-xs">
<label class="text-label-bold font-label-bold text-on-surface-variant" for="fullName">Full Name</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]">badge</span>
</div>
<input class="w-full pl-10 pr-4 py-3 bg-surface-container-low border border-outline-variant rounded-xl text-body-md font-body-md text-on-surface placeholder:text-outline/70 focus:outline-none focus:border-primary-container focus:ring-2 focus:ring-primary-container/20 transition-all duration-200" id="fullName" name="fullName" placeholder="Jane Doe" required="" type="text"/>
</div>
</div>
<!-- Email -->
<div class="flex flex-col gap-xs">
<label class="text-label-bold font-label-bold text-on-surface-variant" for="email">Email Address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]">mail</span>
</div>
<input class="w-full pl-10 pr-4 py-3 bg-surface-container-low border border-outline-variant rounded-xl text-body-md font-body-md text-on-surface placeholder:text-outline/70 focus:outline-none focus:border-primary-container focus:ring-2 focus:ring-primary-container/20 transition-all duration-200" id="email" name="email" placeholder="jane@example.com" required="" type="email"/>
</div>
</div>
<!-- Password -->
<div class="flex flex-col gap-xs">
<label class="text-label-bold font-label-bold text-on-surface-variant" for="password">Password</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
<input class="w-full pl-10 pr-4 py-3 bg-surface-container-low border border-outline-variant rounded-xl text-body-md font-body-md text-on-surface placeholder:text-outline/70 focus:outline-none focus:border-primary-container focus:ring-2 focus:ring-primary-container/20 transition-all duration-200" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Confirm Password -->
<div class="flex flex-col gap-xs">
<label class="text-label-bold font-label-bold text-on-surface-variant" for="confirmPassword">Confirm Password</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]">verified_user</span>
</div>
<input class="w-full pl-10 pr-4 py-3 bg-surface-container-low border border-outline-variant rounded-xl text-body-md font-body-md text-on-surface placeholder:text-outline/70 focus:outline-none focus:border-primary-container focus:ring-2 focus:ring-primary-container/20 transition-all duration-200" id="confirmPassword" name="confirmPassword" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Terms (Implicit minimal requirement for pro feel) -->
<div class="pt-2">
<p class="text-caption font-caption text-on-surface-variant text-center leading-relaxed">
                        By creating an account, you agree to our <a class="text-primary-container hover:underline" href="#">Terms of Service</a> and <a class="text-primary-container hover:underline" href="#">Privacy Policy</a>.
                    </p>
</div>
<!-- Submit Button -->
<button class="w-full mt-2 bg-primary-container text-on-primary py-4 rounded-xl text-label-bold font-label-bold hover:bg-surface-tint shadow-[0_4px_20px_rgba(79,70,229,0.15)] hover:shadow-[0_10px_30px_rgba(79,70,229,0.25)] transition-all duration-300 transform active:scale-[0.98]" type="submit">
                    Create Account
                </button>
</form>
</div>
<!-- Footer Link -->
<div class="mt-lg text-center">
<p class="text-body-md font-body-md text-on-surface-variant">
                Already have an account? 
                <a class="text-primary-container font-label-bold text-label-bold hover:underline transition-all" href="#">Log In</a>
</p>
</div>
</main>
</body></html>
