<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Book a Service - SkillLink</title>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Theme Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-fixed": "#dce2f7",
                        "surface-container-lowest": "#ffffff",
                        "background": "#fcf8ff",
                        "secondary-fixed-dim": "#c0c6db",
                        "inverse-primary": "#c3c0ff",
                        "surface": "#fcf8ff",
                        "outline": "#777587",
                        "surface-container-high": "#eae6f4",
                        "on-secondary-fixed-variant": "#404758",
                        "on-error-container": "#93000a",
                        "on-background": "#1b1b24",
                        "error": "#ba1a1a",
                        "surface-container-low": "#f5f2ff",
                        "on-tertiary": "#ffffff",
                        "surface-tint": "#4d44e3",
                        "surface-container": "#f0ecf9",
                        "tertiary": "#7e3000",
                        "outline-variant": "#c7c4d8",
                        "on-surface-variant": "#464555",
                        "on-error": "#ffffff",
                        "surface-dim": "#dcd8e5",
                        "on-primary-fixed-variant": "#3323cc",
                        "surface-bright": "#fcf8ff",
                        "surface-variant": "#e4e1ee",
                        "error-container": "#ffdad6",
                        "surface-container-highest": "#e4e1ee",
                        "on-tertiary-container": "#ffd2be",
                        "on-secondary-fixed": "#141b2b",
                        "inverse-on-surface": "#f3effc",
                        "on-primary-fixed": "#0f0069",
                        "on-primary-container": "#dad7ff",
                        "primary-fixed-dim": "#c3c0ff",
                        "primary-container": "#4f46e5",
                        "on-tertiary-fixed": "#351000",
                        "on-secondary-container": "#5c6274",
                        "inverse-surface": "#302f39",
                        "secondary": "#575e70",
                        "primary": "#3525cd",
                        "secondary-container": "#d9dff5",
                        "on-primary": "#ffffff",
                        "on-surface": "#1b1b24",
                        "tertiary-fixed": "#ffdbcc",
                        "tertiary-fixed-dim": "#ffb695",
                        "tertiary-container": "#a44100",
                        "primary-fixed": "#e2dfff",
                        "on-tertiary-fixed-variant": "#7b2f00",
                        "on-secondary": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "lg": "48px",
                        "margin": "auto",
                        "gutter": "24px",
                        "xs": "4px",
                        "grid_columns": "12",
                        "xl": "80px",
                        "sm": "12px",
                        "md": "24px",
                        "base": "8px"
                    },
                    "fontFamily": {
                        "h1": ["Manrope"],
                        "h3": ["Manrope"],
                        "body-lg": ["Manrope"],
                        "label-bold": ["Manrope"],
                        "h2": ["Manrope"],
                        "caption": ["Manrope"],
                        "body-md": ["Manrope"]
                    },
                    "fontSize": {
                        "h1": ["48px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "800" }],
                        "h3": ["24px", { "lineHeight": "1.4", "letterSpacing": "0", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "label-bold": ["14px", { "lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "h2": ["36px", { "lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "caption": ["12px", { "lineHeight": "1.4", "fontWeight": "500" }],
                        "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md antialiased min-h-screen selection:bg-primary-container selection:text-on-primary-container">
<!-- Main Content Canvas -->
<!-- Navigation shell is deliberately suppressed here as this is a focused, transactional journey (Booking). -->
<main class="max-w-3xl mx-auto px-6 py-xl">
<!-- Contextual Header -->
<header class="flex items-center gap-md mb-lg">
<button aria-label="Go back" class="w-12 h-12 flex flex-shrink-0 items-center justify-center rounded-full bg-surface-container hover:bg-surface-container-high transition-colors text-on-surface-variant">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-h2 text-h2 text-on-background tracking-tight">Request Booking</h1>
</header>
<!-- Provider Summary Card -->
<section class="bg-surface-container-lowest rounded-xl shadow-[0_4px_20px_rgba(0,0,0,0.03)] border border-surface-variant p-md flex items-center gap-md mb-lg transition-transform hover:-translate-y-1 duration-300">
<div class="relative flex-shrink-0">
<img alt="Provider Avatar" class="w-16 h-16 rounded-full object-cover border-2 border-surface-container-lowest shadow-sm" data-alt="Professional headshot of a confident female consultant wearing a navy blazer, bright outdoor natural lighting, soft blurred background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAonZkioZaHC7U7Typ_ANZz9dNBpCWo57i_HGjuORjgjZxOxYBjoGZoIHEQCTP-wKoQeqEyZrSUnmOu4-eWCebxQSQUWPAkrIOm70y8n4-G62IJY9iQJgyBUEdU7hUhCud-AtNPFnY-Cxu_BtkQaA2TwtYjOJ8i30-B5gU-JehSQmlmd1Yq3J9d3GbPZdDlr8J6QfApDyb792hK3jlfyXPrlTPl0ialHQZokA8cdRefWaGjRhJeLBvq39EpF6Tr_VXikj700vKZ"/>
<div class="absolute bottom-0 right-0 w-4 h-4 bg-[#10B981] border-2 border-surface-container-lowest rounded-full" title="Online Now"></div>
</div>
<div class="flex-grow">
<div class="flex items-center justify-between">
<h2 class="font-h3 text-h3 text-on-background">Dr. Sarah Jenkins</h2>
<div class="flex items-center gap-1 bg-surface-container px-2 py-1 rounded-full">
<span class="material-symbols-outlined text-[14px] text-tertiary-container" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="font-label-bold text-caption text-on-surface-variant">4.9</span>
</div>
</div>
<p class="font-body-md text-body-md text-secondary mt-1">Executive Leadership Coach</p>
</div>
</section>
<!-- Booking Form -->
<form class="space-y-lg bg-surface-container-lowest rounded-xl shadow-[0_4px_20px_rgba(0,0,0,0.03)] border border-surface-variant p-md lg:p-lg">
<!-- Job Description Field -->
<div class="space-y-sm">
<label class="block font-label-bold text-label-bold text-on-background" for="job_description">Project Description</label>
<p class="font-caption text-caption text-secondary mb-2">Briefly describe what you need help with to ensure it's a good fit.</p>
<textarea class="w-full rounded-xl bg-surface-container-low border border-outline-variant p-4 font-body-md text-body-md text-on-background focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all resize-y placeholder:text-secondary-fixed-dim" id="job_description" name="job_description" placeholder="E.g., I am looking for a 3-month coaching engagement to prepare for a transition to a VP role..." rows="4"></textarea>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-lg">
<!-- Preferred Date -->
<div class="space-y-sm">
<label class="block font-label-bold text-label-bold text-on-background" for="preferred_date">Preferred Start Date</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant pointer-events-none">calendar_today</span>
<!-- Simulating a custom styled date picker input -->
<input class="w-full rounded-xl bg-surface-container-low border border-outline-variant py-4 pl-12 pr-4 font-body-md text-body-md text-on-background cursor-pointer hover:border-primary transition-colors focus:outline-none focus:ring-1 focus:ring-primary" id="preferred_date" name="preferred_date" readonly="" type="text" value="November 12, 2023"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">expand_more</span>
</div>
</div>
<!-- Preferred Time Structure (Bento style) -->
<div class="space-y-sm">
<label class="block font-label-bold text-label-bold text-on-background">Preferred Time Window</label>
<div class="grid grid-cols-2 gap-3">
<button class="py-3 px-4 rounded-xl border border-outline-variant bg-surface-container-lowest text-center hover:border-primary transition-colors focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" type="button">
<span class="block font-label-bold text-label-bold text-on-surface-variant">Morning</span>
<span class="block font-caption text-caption text-secondary mt-1">9AM - 12PM</span>
</button>
<!-- Active State -->
<button class="py-3 px-4 rounded-xl border-2 border-primary bg-primary-fixed text-center focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 shadow-[0_4px_12px_rgba(53,37,205,0.1)]" type="button">
<span class="block font-label-bold text-label-bold text-on-primary-fixed-variant">Afternoon</span>
<span class="block font-caption text-caption text-primary mt-1">1PM - 5PM</span>
</button>
</div>
</div>
</div>
<hr class="border-t border-surface-variant my-lg"/>
<!-- Action Area -->
<div class="pt-2">
<button class="w-full py-4 rounded-xl bg-primary text-on-primary font-label-bold text-label-bold hover:bg-primary-container hover:text-on-primary-container transition-all flex justify-center items-center gap-2 shadow-[0_10px_30px_rgba(53,37,205,0.15)] hover:shadow-[0_10px_30px_rgba(53,37,205,0.25)]" type="submit">
                    Send Booking Request
                    <span class="material-symbols-outlined text-[18px]">send</span>
</button>
<div class="flex items-start gap-2 mt-4 text-center justify-center">
<span class="material-symbols-outlined text-[16px] text-secondary mt-0.5">lock</span>
<p class="font-caption text-caption text-secondary max-w-sm">
                        You won't be charged yet. The provider has 24 hours to review and accept your request.
                    </p>
</div>
</div>
</form>
</main>
</body></html>
