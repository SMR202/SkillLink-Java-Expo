<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- Top App Bar (Suppressed due to linear/transactional intent, but adding a simplified back-nav header) -->
<header class="w-full px-md py-md flex items-center justify-between border-b border-surface-variant bg-surface sticky top-0 z-50">
<button class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-surface-container-high transition-colors text-on-surface">
<span class="material-symbols-outlined text-[24px]">close</span>
</button>
<span class="font-h3 text-h3 text-on-surface">Leave a Review</span>
<div class="w-10 h-10"></div> <!-- Spacer for centering -->
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-md py-lg max-w-[600px] w-full mx-auto">
<!-- Provider Info Card -->
<div class="w-full flex flex-col items-center mb-lg">
<div class="relative w-24 h-24 rounded-full mb-sm shadow-[0_4px_20px_rgba(0,0,0,0.03)] overflow-hidden border-4 border-surface-container-lowest">
<img alt="Sarah Jenkins, Web Developer" class="w-full h-full object-cover" data-alt="Professional headshot of a smiling female web developer in a bright modern office with natural lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuABhIKyx7EeN6IbxDVFfACkEsG2rEjcHq_9KtGEiq9ny-1ie1rMDhGC3dlLohWcrBCN59jT0jAGKKjKumO1xenruQjrfbejK9czMhGts6um_OlwSHugA1uWXZQHhyvj_P7nKJ1-SGZe8u4EaPgRhCx2QvFSu5oJDQnN9WAgK0L1O_CzBIFV0COpza34fn_Hx6iytGI4YWuc30ERj-0uPq_2WMxQGqXLPx51_x8h6EX9OsNFL15V4DWwNng-9r7usS_wdLOGs8TI"/>
<div class="absolute bottom-0 right-0 w-6 h-6 bg-surface-container-lowest rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-[16px] text-primary" style="font-variation-settings: 'FILL' 1;">verified</span>
</div>
</div>
<h2 class="font-h2 text-h2 text-on-surface text-center mb-xs">Sarah Jenkins</h2>
<p class="font-body-md text-body-md text-on-surface-variant text-center">Senior Full-Stack Developer</p>
</div>
<!-- Rating Section -->
<div class="w-full bg-surface-container-lowest rounded-xl shadow-[0_4px_20px_rgba(0,0,0,0.03)] p-md mb-lg">
<h3 class="font-h3 text-h3 text-on-surface text-center mb-md">How was your experience?</h3>
<div class="flex items-center justify-center gap-xs mb-sm">
<button class="group p-xs transition-transform hover:scale-110 active:scale-95 focus:outline-none">
<span class="material-symbols-outlined text-[48px] text-primary" style="font-variation-settings: 'FILL' 1;">star</span>
</button>
<button class="group p-xs transition-transform hover:scale-110 active:scale-95 focus:outline-none">
<span class="material-symbols-outlined text-[48px] text-primary" style="font-variation-settings: 'FILL' 1;">star</span>
</button>
<button class="group p-xs transition-transform hover:scale-110 active:scale-95 focus:outline-none">
<span class="material-symbols-outlined text-[48px] text-primary" style="font-variation-settings: 'FILL' 1;">star</span>
</button>
<button class="group p-xs transition-transform hover:scale-110 active:scale-95 focus:outline-none">
<span class="material-symbols-outlined text-[48px] text-primary" style="font-variation-settings: 'FILL' 1;">star</span>
</button>
<button class="group p-xs transition-transform hover:scale-110 active:scale-95 focus:outline-none">
<span class="material-symbols-outlined text-[48px] text-outline-variant group-hover:text-primary-fixed-dim transition-colors" style="font-variation-settings: 'FILL' 0;">star</span>
</button>
</div>

<label class="font-label-bold text-label-bold text-on-surface mb-sm px-xs" for="review-text">Share details of your experience</label>
<textarea class="w-full bg-surface-bright border border-outline-variant rounded-xl p-md font-body-md text-body-md text-on-surface placeholder-on-surface-variant focus:border-primary focus:ring-2 focus:ring-primary-container/20 transition-all resize-none shadow-sm" id="review-text" placeholder="What did they do well? How could they improve? Your feedback helps the community." rows="5"></textarea>
<div class="flex justify-between items-center mt-xs px-xs">
<span class="font-caption text-caption text-on-surface-variant flex items-center gap-1">
<span class="material-symbols-outlined text-[14px]">lock</span>

                 </span>

</div>
</div>
